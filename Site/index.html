<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ultra-sleek iOS-inspired Music Player featuring premium glassmorphism and full-bleed media backgrounds">
    <title>Music Player</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Immersive Background Media -->
    <div id="background-layer">
        <video id="bg-video" muted loop playsinline autoplay></video>
        <img id="bg-image" alt="Background">
    </div>

    <!-- Main Container: Full Viewport Split Screen Grid -->
    <div id="app">
        <!-- LEFT SIDE: Media Cover & Visualizer + Controls -->
        <main id="player-pane" class="glass-container">
            <!-- Top Controls (Switch Background Wallpaper) -->
            <div class="pane-header">
                <span class="active-badge">CЕЙЧАС ИГРАЕТ</span>
                <button id="bg-toggle-btn" class="ios-btn" title="Сменить фон">
                    <!-- Gallery SVG Icon -->
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        <circle cx="8.5" cy="8.5" r="1.5"></circle>
                        <polyline points="21 15 16 10 5 21"></polyline>
                    </svg>
                </button>
            </div>

            <!-- Immersive Circular / Animated Wave Visualizer -->
            <div id="visualizer-wrapper">
                <canvas id="visualizer"></canvas>
            </div>

            <!-- Track Info & Metadata -->
            <div id="now-playing-info">
                <h1 id="track-title">Выбери трек</h1>
            </div>

            <!-- Progress Bar Section -->
            <div id="playback-progress">
                <div class="progress-bar-wrapper">
                    <div id="progress-bar">
                        <div id="progress-fill"></div>
                        <input type="range" id="progress-range" min="0" max="100" value="0" step="0.1">
                    </div>
                </div>
                <div class="time-labels">
                    <span id="time-current">0:00</span>
                    <span id="time-total">0:00</span>
                </div>
            </div>

            <!-- Main Control Bar -->
            <div id="control-bar">
                <!-- Shuffle -->
                <button id="btn-shuffle" class="ios-btn" title="Перемешать">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="16 3 21 3 21 8"></polyline>
                        <line x1="4" y1="20" x2="21" y2="3"></line>
                        <polyline points="21 16 21 21 16 21"></polyline>
                        <line x1="15" y1="15" x2="21" y2="21"></line>
                        <line x1="4" y1="4" x2="9" y2="9"></line>
                    </svg>
                </button>

                <!-- Previous -->
                <button id="btn-prev" class="ios-btn" title="Предыдущий">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M19 6l-8.5 6 8.5 6V6zM8 6v12h2V6H8z"/>
                    </svg>
                </button>

                <!-- Play/Pause -->
                <button id="btn-play" class="ios-btn play-pause-btn" title="Воспроизвести">
                    <!-- Play icon initially -->
                    <svg id="play-icon" width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                </button>

                <!-- Next -->
                <button id="btn-next" class="ios-btn" title="Следующий">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M5 6v12l8.5-6L5 6zm11 0v12h2V6h-2z"/>
                    </svg>
                </button>

                <!-- Repeat -->
                <button id="btn-repeat" class="ios-btn" title="Повтор">
                    <svg id="repeat-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="17 1 21 5 17 9"></polyline>
                        <path d="M3 11V9a4 4 0 0 1 4-4h14"></path>
                        <polyline points="7 23 3 19 7 15"></polyline>
                        <path d="M21 13v2a4 4 0 0 1-4 4H3"></path>
                    </svg>
                </button>
            </div>

            <!-- Volume Control -->
            <div id="volume-control">
                <button id="btn-volume" class="ios-btn" title="Громкость">
                    <svg id="volume-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M11 5L6 9H2v6h4l5 4V5z"/>
                        <path d="M15.54 8.46a5 5 0 0 1 0 7.07M19.07 4.93a10 10 0 0 1 0 14.14"/>
                    </svg>
                </button>
                <div class="volume-slider-wrapper">
                    <input type="range" id="volume-range" min="0" max="100" value="80" step="1">
                    <div id="volume-progress"></div>
                </div>
            </div>
        </main>

        <!-- RIGHT SIDE: Scrollable Interactive Tracks & Wallpapers -->
        <aside id="library-pane" class="glass-container">
            <div class="library-header">
                <h2>Плейлист</h2>
            </div>
            <div id="track-list-wrapper">
                <ul id="track-list">
                    <li class="empty-msg">Добавь музыку в папку <code>music</code></li>
                </ul>
            </div>
        </aside>

        <!-- Dynamic Wallpaper Selection Panel (Modal Drawer) -->
        <div id="bg-panel" class="glass-panel hidden">
            <div class="panel-header">
                <h3>Смена фона</h3>
                <button id="bg-panel-close" class="ios-btn circle-btn" title="Закрыть">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div id="bg-list" class="bg-grid">
                <p class="empty-msg">Добавь файлы в папку <code>zadni</code></p>
            </div>
        </div>
        <div id="bg-overlay" class="hidden"></div>
    </div>

    <!-- Hidden Audio Stream -->
    <audio id="audio-player" preload="auto"></audio>
    <script src="app.js"></script>
</body>
</html>
